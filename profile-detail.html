<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>S.H.I.E.L.D. — PERFIL DE AGENTE</title>
    
    <!-- Enlaces a hojas de estilo externas -->
    <link rel="stylesheet" type="text/css" href="css/style.css"/>
    <link rel="stylesheet" type="text/css" href="css/animations.css"/>
    <link rel="stylesheet" type="text/css" href="css/enhancements.css"/>
    
    <!-- Iconos de Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet"/>
</head>
<body class="profile-page">

<!-- Capas de efectos CRT -->
<div class="scanline-overlay"></div>

<!-- Navegación Superior -->
<nav class="fixed-nav">
    <div class="nav-container">
        <div class="nav-logo">S.H.I.E.L.D. TERMINAL</div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">BASE_DE_DATOS</a>
            <a href="#" class="nav-link active">EXPEDIENTE</a>
        </div>
        <button onclick="window.location.href='index.html'" class="btn-access">
            SALIR
        </button>
    </div>
</nav>

<main class="main-content-profile">
    <div class="profile-grid">
        
        <!-- SECCIÓN IZQUIERDA: IMAGEN Y HUD -->
        <section class="profile-hero">
            <img id="hero-img" src="" alt="Agente" class="hero-image">
            <div class="hero-overlay"></div>
            
            <div class="hud-overlay">
                <div class="hud-top">
                    <div class="hud-badge">
                        <span class="hud-dot"></span>
                        IDENTIDAD VERIFICADA: 100%
                    </div>
                </div>
                
                <div class="hud-bottom">
                    <h3 id="subject-label" class="hud-label">SUBJECT: AGENT</h3>
                    <h1 id="agent-name-display" class="hero-name">NOMBRE<br/><span class="text-primary">APELLIDO</span></h1>
                    <div class="hud-files">
                        <span id="file-id" class="file-badge">FILE // 000-X</span>
                        <span class="clearance-badge">NIVEL 7</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECCIÓN DERECHA: DATOS TÉCNICOS -->
        <section class="profile-data p-12">
            <div class="data-container">
                
                <!-- Cuadrícula de Poder -->
                <div class="power-grid-section">
                    <h2 class="section-title-small">POWER GRID // ANALÍTICAS</h2>
                    <div id="stats-container" class="stats-bars">
                        <!-- Las barras de poder se inyectan por JS -->
                    </div>
                </div>

                <!-- Biografía Clasificada -->
                <article class="bio-article">
                    <h3 class="bio-title">BIOGRAFÍA CLASIFICADA</h3>
                    <p id="agent-bio" class="bio-text">
                        Cargando datos del servidor central...
                    </p>
                </article>

                <!-- Botón de retorno -->
                <div class="mt-12">
                    <a href="index.html" class="btn-primary-wide">
                        VOLVER A LA BASE DE DATOS
                    </a>
                </div>
            </div>
        </section>
    </div>
</main>

<script>
    // Datos de los 8 agentes sincronizados con index.html
    const agentsData = {
        'ironman': {
            subject: 'Iron Man',
            firstName: 'TONY',
            lastName: 'STARK',
            id: '882-B',
            img: 'img/ironman.png',
            bio: 'Genio, multimillonario, playboy y filántropo. Tony Stark diseñó una armadura de alta tecnología tras ser capturado, convirtiéndose en el pilar tecnológico de los Vengadores.',
            stats: [6, 6, 5, 6, 6, 4]
        },
        'capamerica': {
            subject: 'Capitán América',
            firstName: 'STEVE',
            lastName: 'ROGERS',
            id: '107-C',
            img: 'img/cap_america.png',
            bio: 'El Primer Vengador. Transformado por el suero del Súper Soldado, Steve Rogers lidera con un valor y una moral inquebrantables.',
            stats: [3, 4, 3, 4, 1, 7]
        },
        'thor': {
            subject: 'Thor Odinson',
            firstName: 'THOR',
            lastName: 'ODINSON',
            id: '004-A',
            img: 'img/thor.png',
            bio: 'Dios del Trueno y heredero de Asgard. Armado con el Mjolnir, protege tanto la Tierra como los Nueve Reinos de amenazas cósmicas.',
            stats: [2, 7, 6, 7, 6, 4]
        },
        'hulk': {
            subject: 'Bruce Banner',
            firstName: 'BRUCE',
            lastName: 'BANNER',
            id: '505-G',
            img: 'img/hulk.png',
            bio: 'Tras una exposición masiva a radiación gamma, el Dr. Banner se transforma en Hulk, la fuerza física más destructiva de S.H.I.E.L.D.',
            stats: [6, 7, 3, 7, 1, 4]
        },
        'blackwidow': {
            subject: 'Black Widow',
            firstName: 'NATASHA',
            lastName: 'ROMANOFF',
            id: '422-R',
            img: 'img/widow.png',
            bio: 'Experta en espionaje y combate cuerpo a cuerpo. Natasha es una pieza clave para misiones de infiltración y sigilo táctico.',
            stats: [4, 3, 2, 3, 1, 7]
        },
        'hawkeye': {
            subject: 'Hawkeye',
            firstName: 'CLINT',
            lastName: 'BARTON',
            id: '606-H',
            img: 'img/hawkeye.png',
            bio: 'Maestro tirador con una precisión del 100%. Sus flechas trucadas le permiten enfrentarse a cualquier tipo de amenaza.',
            stats: [3, 3, 2, 2, 1, 6]
        },
        'blackpanther': {
            subject: 'Black Panther',
            firstName: "T'CHALLA",
            lastName: 'KING',
            id: '909-P',
            img: 'img/black_panter.png',
            bio: 'Rey de Wakanda. Combina tecnología avanzada de Vibranium con habilidades físicas aumentadas y sabiduría ancestral.',
            stats: [5, 4, 4, 4, 1, 7]
        },
        'scarletwitch': {
            subject: 'Scarlet Witch',
            firstName: 'WANDA',
            lastName: 'MAXIMOFF',
            id: '707-W',
            img: 'img/escarlata.png',
            bio: 'Poseedora de la Magia del Caos. Su capacidad para alterar la realidad la convierte en uno de los seres más poderosos de la Tierra.',
            stats: [3, 2, 2, 2, 7, 3]
        }
    };

    const statNames = ['Inteligencia', 'Fuerza', 'Velocidad', 'Resistencia', 'Energía', 'Combate'];

    function initProfile() {
        const urlParams = new URLSearchParams(window.location.search);
        const agentId = urlParams.get('agent') || 'ironman';
        const data = agentsData[agentId] || agentsData['ironman'];

        // Cargar Datos en UI
        document.getElementById('hero-img').src = data.img;
        document.getElementById('subject-label').textContent = `SUBJECT: ${data.subject}`;
        document.getElementById('agent-name-display').innerHTML = `${data.firstName}<br/><span style="color:#e8001c">${data.lastName}</span>`;
        document.getElementById('file-id').textContent = `FILE // ${data.id}`;
        document.getElementById('agent-bio').textContent = data.bio;

        // Cargar Estadísticas
        const container = document.getElementById('stats-container');
        data.stats.forEach((val, i) => {
            const percentage = (val / 7) * 100;
            container.innerHTML += `
                <div class="stat-row">
                    <div class="stat-info">
                        <span>${statNames[i]}</span>
                        <span class="stat-value">${val} / 7</span>
                    </div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill" style="width: ${percentage}%"></div>
                    </div>
                </div>
            `;
        });
    }

    window.onload = initProfile;
</script>

</body>
</html>
